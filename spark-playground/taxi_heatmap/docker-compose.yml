networks:
  kafka-spark:
    name: kafka-spark
    driver: bridge

volumes:
  kafka1_data:
    driver: local
  kafka2_data:
    driver: local

services:
  kafka1:
    image: docker.io/bitnami/kafka
    container_name: kafka1
    ports:
      - "9092:9092"
    volumes:
      - "kafka1_data:/bitnami"
    environment:
      - KAFKA_BROKER_ID=0
      - KAFKA_CFG_NODE_ID=0
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka1:9094
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
    networks:
      - kafka-spark
    
  kafka2:
    image: docker.io/bitnami/kafka
    container_name: kafka2
    ports:
      - "9093:9093"
    volumes:
      - "kafka2_data:/bitnami"
    environment:
      - KAFKA_BROKER_ID=0
      - KAFKA_CFG_NODE_ID=0
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9093,CONTROLLER://:9095
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka2:9095
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
    networks:
      - kafka-spark
    
  spark-master:
    build:
      dockerfile: ./spark-streaming/Dockerfile
    container_name: spark-master
    networks:
      - kafka-spark

  spark-worker-1:
    image: docker.io/bitnami/spark
    container_name: spark-worker-1
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_CORES=1
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    networks:
      - kafka-spark

  spark-worker-2:
    image: docker.io/bitnami/spark
    container_name: spark-worker-2
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_CORES=1
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    networks:
      - kafka-spark

  python-producer-taxi:
    container_name: python-producer-taxi
    build:
      dockerfile: ./python-producer-taxi/Dockerfile
    networks:
      - kafka-spark

  python-consumer:
    container_name: python-consumer
    build:
      dockerfile: ./python-consumer/Dockerfile
    networks:
      - kafka-spark
